# Server settings
server.address=0.0.0.0
server.port=8083
server.servlet.context-path=/api

# Application name
spring.application.name=dis-news-service

# Database
spring.datasource.url=jdbc:mysql://172.16.0.19:3306/dis_news?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ulaanbaatar
spring.datasource.username=admin
spring.datasource.password=YourStrongPass!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Static resources & encoding
spring.web.resources.static-locations=classpath:/static/
spring.web.encoding.charset=UTF-8
spring.web.encoding.enabled=true
spring.web.encoding.force=true

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
